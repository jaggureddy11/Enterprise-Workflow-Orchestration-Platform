global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'ewap-dev'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:4001']
    metrics_path: '/metrics'

  - job_name: 'workflow-service'
    static_configs:
      - targets: ['workflow-service:4002']
    metrics_path: '/metrics'

  - job_name: 'task-service'
    static_configs:
      - targets: ['task-service:4003']
    metrics_path: '/metrics'

  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification-service:4004']
    metrics_path: '/metrics'

  - job_name: 'analytics-service'
    static_configs:
      - targets: ['analytics-service:4005']
    metrics_path: '/metrics'

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:4000']
    metrics_path: '/metrics'

  - job_name: 'audit-service'
    static_configs:
      - targets: ['audit-service:4007']
    metrics_path: '/metrics'
